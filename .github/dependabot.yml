version: 2
updates:
  # PHP dependencies (the CLI itself)
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # VitePress docs toolchain (dev/build-time only)
  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions workflow pins
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
